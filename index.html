<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2332" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Conflict Ref" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Israel–Palestine timeline, fact checks, and debate reference." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Conflict Reference — Timeline & Fact Check</title>
  <script>
    try {
      const saved = JSON.parse(localStorage.getItem("conflict-reference-v11"));
      if (saved?.darkMode) document.documentElement.setAttribute("data-theme", "dark");
    } catch {}
  </script>
  <style>
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --sidebar: #1a2332;
      --sidebar-text: #b8c0cc;
      --border: #d8dde6;
      --text: #1a1d24;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --timeline: #0d9488;
      --factcheck: #b45309;
      --sources: #7c3aed;
      --verified: #15803d;
      --radius: 12px;
      --shadow: 0 4px 14px rgba(0,0,0,0.06);
      --inset-bg: #f8fafc;
      --inset-text: #334155;
      --highlight: #fef08a;
      --guide-border: #93c5fd;
      --overlay: rgba(0,0,0,0.45);
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0c1017;
      --surface: #151d2b;
      --sidebar: #0a0f18;
      --sidebar-text: #94a3b8;
      --border: #2a3548;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #4d9fff;
      --accent-soft: #1a2d4a;
      --timeline: #2dd4bf;
      --factcheck: #f59e0b;
      --sources: #a78bfa;
      --verified: #4ade80;
      --shadow: 0 4px 18px rgba(0,0,0,0.35);
      --inset-bg: #1a2436;
      --inset-text: #c5d0e0;
      --highlight: #854d0e;
      --guide-border: #1e40af;
      --overlay: rgba(0,0,0,0.65);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      height: 100vh;
      height: 100dvh;
    }

    .nav-backdrop {
      display: none;
    }

    .sidebar {
      background: var(--sidebar);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      z-index: 200;
    }

    .menu-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 1.2rem 1rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-header h1 { color: #fff; font-size: 1rem; font-weight: 600; }
    .sidebar-header p { font-size: 0.72rem; margin-top: 0.25rem; opacity: 0.75; line-height: 1.4; }

    .nav { padding: 0.5rem; flex: 1; }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--sidebar-text);
      font-size: 0.88rem;
      cursor: pointer;
      text-align: left;
      margin-bottom: 0.2rem;
    }

    .nav-btn:hover { background: rgba(255,255,255,0.07); }
    .nav-btn.active { background: rgba(37,99,235,0.3); color: #fff; font-weight: 600; }

    .nav-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-footer button {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: transparent;
      color: var(--sidebar-text);
      font-size: 0.8rem;
      cursor: pointer;
      margin-bottom: 0.35rem;
    }

    .sidebar-footer button:hover { background: rgba(255,255,255,0.08); color: #fff; }

    .main { display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.8rem 1.25rem;
      padding-top: max(0.8rem, env(safe-area-inset-top));
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .topbar h2 { font-size: 1.1rem; flex: 1; min-width: 0; }

    .topbar-tools {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1 1 100%;
      min-width: 0;
    }

    .search {
      padding: 0.55rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.88rem;
      min-width: 200px;
      flex: 1;
      max-width: 320px;
      background: var(--surface);
      color: var(--text);
    }

    .filter-select {
      padding: 0.55rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      background: var(--surface);
      color: var(--text);
    }

    .btn {
      padding: 0.5rem 0.9rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }

    .btn:hover { border-color: var(--accent); }

    .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-primary:hover { opacity: 0.92; border-color: var(--accent); }

    .theme-toggle {
      padding: 0.5rem 0.75rem;
      min-width: auto;
      white-space: nowrap;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      padding-bottom: max(1.25rem, env(safe-area-inset-bottom));
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .guide-banner {
      background: var(--accent-soft);
      border: 1px solid var(--guide-border);
      border-radius: var(--radius);
      padding: 1rem 1.15rem;
      margin-bottom: 1.25rem;
      font-size: 0.88rem;
    }

    .guide-banner strong { display: block; margin-bottom: 0.35rem; }

    .guide-banner ul { margin: 0.5rem 0 0 1.1rem; }
    .guide-banner li { margin-bottom: 0.2rem; }

    /* Timeline */
    .timeline { max-width: 820px; }

    .timeline-item {
      display: grid;
      grid-template-columns: 110px 20px 1fr;
      gap: 0 1rem;
      margin-bottom: 0.5rem;
    }

    .timeline-date {
      text-align: right;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--timeline);
      padding-top: 1rem;
      line-height: 1.3;
    }

    .timeline-line {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 1.1rem;
    }

    .timeline-line::before {
      content: "";
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--timeline);
      border: 3px solid var(--accent-soft);
      flex-shrink: 0;
    }

    .timeline-line::after {
      content: "";
      width: 2px;
      flex: 1;
      background: var(--border);
      margin-top: 4px;
    }

    .timeline-item:last-child .timeline-line::after { display: none; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .card.pinned { border-left: 4px solid var(--accent); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.85rem 1rem 0.4rem;
    }

    .card-title { font-weight: 600; font-size: 1rem; }

    .card-era {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--bg);
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .card-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }

    .icon-btn {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--muted);
      touch-action: manipulation;
    }

    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

    .card-section {
      padding: 0.35rem 1rem;
      font-size: 0.9rem;
    }

    .card-section:last-child { padding-bottom: 0.9rem; }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .card-section p, .card-section pre {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .sources-block {
      background: var(--inset-bg);
      border-radius: 8px;
      padding: 0.5rem 0.65rem;
      font-size: 0.84rem;
      color: var(--inset-text);
      border: 1px solid var(--border);
    }

    .sources-block a { color: var(--accent); }

    /* Fact check cards */
    .fact-card .false-claim {
      background: #fef2f2;
      border-left: 3px solid #ef4444;
      padding: 0.6rem 0.75rem;
      border-radius: 0 8px 8px 0;
      margin: 0.5rem 1rem;
      font-size: 0.9rem;
    }

    .fact-card .correction {
      background: #f0fdf4;
      border-left: 3px solid var(--verified);
      padding: 0.6rem 0.75rem;
      border-radius: 0 8px 8px 0;
      margin: 0.5rem 1rem 0.75rem;
      font-size: 0.9rem;
    }

    .source-card .card-section { padding-top: 0.5rem; }

    .source-type {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      background: #ede9fe;
      color: var(--sources);
      margin-bottom: 0.4rem;
    }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .highlight { background: var(--highlight); color: var(--text); border-radius: 2px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 0.85rem;
      max-width: 960px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .stat-card.pinned { border-left: 4px solid var(--accent); }

    .stat-category {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .stat-number {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.1;
    }

    .stat-label {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
    }

    .stat-cite {
      font-size: 0.84rem;
      color: var(--inset-text);
      background: var(--inset-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.65rem;
      flex: 1;
    }

    .stat-meta {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .stat-actions {
      display: flex;
      gap: 0.35rem;
      margin-top: 0.25rem;
    }

    .stat-group-title {
      font-size: 0.95rem;
      font-weight: 700;
      margin: 1.25rem 0 0.65rem;
      color: var(--text);
      max-width: 960px;
    }

    .stat-group-title:first-child { margin-top: 0; }

    .opponent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
      max-width: 820px;
      overflow: hidden;
    }

    .opponent-card.pinned { border-left: 4px solid #dc2626; }

    .opponent-header {
      padding: 0.85rem 1rem;
      background: #fef2f2;
      border-bottom: 1px solid #fecaca;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .opponent-header .card-title { color: #991b1b; font-size: 0.98rem; }

    .opponent-tag {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #b91c1c;
      background: #fee2e2;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .israel-arg {
      background: #fff5f5;
      border-left: 4px solid #ef4444;
      margin: 0.75rem 1rem 0;
      padding: 0.75rem 0.85rem;
      border-radius: 0 8px 8px 0;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .israel-arg-label {
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #b91c1c;
      margin-bottom: 0.35rem;
    }

    .your-response {
      background: #f0fdf4;
      border-left: 4px solid #16a34a;
      margin: 0.65rem 1rem 0.75rem;
      padding: 0.75rem 0.85rem;
      border-radius: 0 8px 8px 0;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .your-response-label {
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #15803d;
      margin-bottom: 0.35rem;
    }

    .concede-point {
      background: #fffbeb;
      border: 1px solid #fde68a;
      margin: 0 1rem 0.75rem;
      padding: 0.5rem 0.7rem;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #92400e;
    }

    .concede-point strong { color: #78350f; }

    .palestine-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
      max-width: 820px;
      overflow: hidden;
    }

    .palestine-card.pinned { border-left: 4px solid #059669; }

    .palestine-header {
      padding: 0.85rem 1rem;
      background: #ecfdf5;
      border-bottom: 1px solid #a7f3d0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .palestine-header .card-title { color: #065f46; font-size: 0.98rem; }

    .palestine-tag {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #047857;
      background: #d1fae5;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .palestine-arg {
      background: #f0fdf4;
      border-left: 4px solid #10b981;
      margin: 0.75rem 1rem 0;
      padding: 0.75rem 0.85rem;
      border-radius: 0 8px 8px 0;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .palestine-arg-label {
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #047857;
      margin-bottom: 0.35rem;
    }

    .rebuttal-block {
      background: #eff6ff;
      border-left: 4px solid #3b82f6;
      margin: 0.65rem 1rem 0.75rem;
      padding: 0.75rem 0.85rem;
      border-radius: 0 8px 8px 0;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .rebuttal-label {
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #1d4ed8;
      margin-bottom: 0.35rem;
    }

    .memorial-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 0.85rem;
      max-width: 780px;
      overflow: hidden;
    }

    .memorial-card.pinned { border-left: 4px solid var(--accent); }

    .memorial-header {
      padding: 0.9rem 1rem 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .memorial-name {
      font-size: 1.08rem;
      font-weight: 700;
      color: var(--text);
    }

    .memorial-date {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .memorial-type {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .memorial-type.palestinian { background: #d1fae5; color: #047857; }
    .memorial-type.israeli { background: #dbeafe; color: #1d4ed8; }

    .memorial-bio {
      padding: 0.35rem 1rem;
      font-size: 0.9rem;
      color: var(--inset-text);
    }

    .memorial-circumstances {
      margin: 0.35rem 1rem 0.75rem;
      padding: 0.65rem 0.75rem;
      background: var(--inset-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .glossary-card, .parallel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 0.85rem;
      max-width: 780px;
      overflow: hidden;
    }

    .glossary-card.pinned, .parallel-card.pinned { border-left: 4px solid #7c3aed; }

    .glossary-term {
      font-size: 1.15rem;
      font-weight: 700;
      color: #5b21b6;
    }

    .parallel-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1e40af;
    }

    .parallel-period {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .ref-tag {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      background: #ede9fe;
      color: #6d28d9;
    }

    .usage-note {
      background: #fffbeb;
      border-left: 3px solid #f59e0b;
      margin: 0.5rem 1rem;
      padding: 0.55rem 0.7rem;
      border-radius: 0 8px 8px 0;
      font-size: 0.85rem;
    }

    .parallel-box {
      background: #eff6ff;
      border-left: 3px solid #3b82f6;
      margin: 0.5rem 1rem;
      padding: 0.55rem 0.7rem;
      border-radius: 0 8px 8px 0;
      font-size: 0.88rem;
    }

    .differences-box {
      background: var(--inset-bg);
      border-left: 3px solid #94a3b8;
      margin: 0.5rem 1rem 0.75rem;
      padding: 0.55rem 0.7rem;
      border-radius: 0 8px 8px 0;
      font-size: 0.88rem;
      color: var(--muted);
    }

    [data-theme="dark"] .fact-card .false-claim { background: #2a1518; }
    [data-theme="dark"] .fact-card .correction { background: #12261a; }
    [data-theme="dark"] .source-type { background: #2a2040; }
    [data-theme="dark"] .opponent-header { background: #2a1518; border-bottom-color: #4a2028; }
    [data-theme="dark"] .opponent-header .card-title { color: #fca5a5; }
    [data-theme="dark"] .opponent-tag { background: #3d1818; color: #fca5a5; }
    [data-theme="dark"] .israel-arg { background: #221518; }
    [data-theme="dark"] .israel-arg-label { color: #fca5a5; }
    [data-theme="dark"] .your-response { background: #12261a; }
    [data-theme="dark"] .your-response-label { color: #86efac; }
    [data-theme="dark"] .concede-point { background: #2a2410; border-color: #4a3d18; color: #fcd34d; }
    [data-theme="dark"] .concede-point strong { color: #fde68a; }
    [data-theme="dark"] .palestine-header { background: #102820; border-bottom-color: #1a4030; }
    [data-theme="dark"] .palestine-header .card-title { color: #6ee7b7; }
    [data-theme="dark"] .palestine-tag { background: #143528; color: #6ee7b7; }
    [data-theme="dark"] .palestine-arg { background: #12261a; }
    [data-theme="dark"] .palestine-arg-label { color: #6ee7b7; }
    [data-theme="dark"] .rebuttal-block { background: #121e30; }
    [data-theme="dark"] .rebuttal-label { color: #93c5fd; }

      max-height: 90vh;

      font-size: 0.78rem;

      margin-bottom: 0.3rem;

      width: 100%;

      font-family: inherit;
      margin-bottom: 0.75rem;
      outline: none;
      background: var(--bg);
      color: var(--text);

    }

      factChecks: [
        {
          id: "fc-001",
          falseClaim: "\"Jewish people only started moving to Palestine because of World War II.\"",
          correction: "Jewish immigration to British Mandate Palestine began well before WWII — major waves occurred in the 1920s and 1930s. What WWII and the Holocaust changed was the scale and urgency: Nazi persecution from 1933 onward and the genocide drove hundreds of thousands to seek any escape, while Britain's 1939 White Paper capped legal immigration. Postwar, Holocaust survivors in DP camps added further pressure. The accurate claim is that WWII massively accelerated immigration — not that immigration started only then.",
          sources: "USHMM — refugees to Palestine:\nhttps://www.ushmm.org/collections/bibliography/selected-readings/jewish-refugees-palestine\n\nWhite Paper 1939:\nhttps://avalon.law.yale.edu/20th_century/brwh1939.asp",
          pinned: true,
        },
        {
          id: "fc-002",
          falseClaim: "\"The UN created Israel with a vote — it was completely legal and binding.\"",
          correction: "UN General Assembly Resolution 181 (Nov 1947) was a non-binding recommendation to partition Palestine. It did not itself create a state. Israel was declared on 14 May 1948 by its provisional government. The legal status of partition and recognition remains debated in international law — but describing 181 as a direct act of state creation is inaccurate.",
          sources: "Resolution 181 full text:\nhttps://www.un.org/unispal/document/auto-insert-180905/\n\nIsraeli Declaration of Independence:\nhttps://www.gov.il/en/departments/guides/declaration_of_independence",
          pinned: true,
        },
        {
          id: "fc-003",
          falseClaim: "\"Palestinians left voluntarily — no one was expelled in 1948.\"",
          correction: "The 1948 displacement was complex: some Palestinians fled fighting or feared reprisals; others were expelled by Israeli forces in documented operations. Israeli historians (including 'New Historians') and Palestinian sources document expulsions. The UN estimated roughly 700,000 refugees by 1949. Reducing it to purely 'voluntary departure' ignores substantial historical evidence of forced displacement.",
          sources: "UNCCP refugee estimate:\nhttps://www.un.org/unispal/document/auto-insert-180907/\n\nBadil — refugee resource center:\nhttps://www.badil.org/",
          pinned: false,
        },
        {
          id: "fc-004",
          falseClaim: "\"Britain allowed Holocaust survivors unlimited entry into Palestine.\"",
          correction: "The opposite is documented: the 1939 White Paper capped immigration at 75,000 over five years. During and after WWII, Britain intercepted illegal immigration ships (e.g., Exodus 1947) and maintained strict quotas. This policy is widely cited as a cause of postwar radicalization on both the Zionist and Arab sides.",
          sources: "White Paper text:\nhttps://avalon.law.yale.edu/20th_century/brwh1939.asp\n\nExodus 1947 — USHMM:\nhttps://www.ushmm.org/collections/bibliography/selected-readings/exodus-1947",
          pinned: false,

        {
          id: "fc-005",
          falseClaim: "\"Israel ended the occupation of Gaza in 2005 — Gaza is free.\"",
          correction: "Israel removed settlers and military posts from inside Gaza in 2005, but retained control of Gaza's airspace, territorial waters, most border crossings (with Egypt controlling Rafah), population registry, and imposed a blockade especially tightened after 2007. The UN, ICJ, and most international legal analysts still classify Gaza as occupied or under effective Israeli control. 'Disengagement' is not equivalent to sovereign independence.",
          sources: "UN OCHA — Gaza blockade:\nhttps://www.ochaopt.org/content/gaza-strip-blockade\n\nICJ 2024 advisory opinion:\nhttps://www.icj-cij.org/case/186",
          pinned: true,
        },
        {
          id: "fc-006",
          falseClaim: "\"Oslo created a Palestinian state in the 1990s.\"",
          correction: "The 1993 Oslo Accords created interim Palestinian self-rule (the Palestinian Authority) in parts of the West Bank and Gaza — not a sovereign state. Final-status issues (borders, Jerusalem, refugees, settlements) were explicitly deferred. Palestinian statehood remains unresolved; the PA governs limited areas under ongoing occupation.",
          sources: "Oslo Declaration of Principles:\nhttps://www.un.org/unispal/document/auto-insert-180916/\n\nPA establishment agreement:\nhttps://www.un.org/unispal/document/auto-insert-180917/",
          pinned: false,

          id: "fc-007",
          falseClaim: "\"Hamas doesn't represent Palestinians — they stole Gaza.\"",
          correction: "Hamas won the majority in the 2006 Palestinian legislative elections — observed by international monitors. After the 2007 Fatah-Hamas split and fighting, Hamas took governing control of Gaza while the PA under Abbas administers parts of the West Bank. Whether Hamas 'represents' Palestinians is political opinion; the documented facts are: they won an election, govern Gaza, and are not the government in the West Bank.",
          sources: "EU election observation report 2006:\nhttps://www.eeas.europa.eu/sites/default/files/eueompalestinianlegislativecouncil2006_en.pdf\n\nICG — internal divide:\nhttps://www.crisisgroup.org/middle-east-north-africa/east-mediterranean-mena/israelpalestine",

          falseClaim: "\"The West Bank settlements are legal because Israel won the land in 1967.\"",
          correction: "The UN Security Council, ICJ, and virtually all states consider Israeli settlements in the occupied West Bank and East Jerusalem a violation of the Fourth Geneva Convention. Resolution 242 called for withdrawal from occupied territories. Military victory does not confer legal sovereignty under international law. Israel disputes this legal framework but it is the near-global consensus.",
          sources: "UNSC Resolution 446 (settlements):\nhttps://www.un.org/unispal/document/auto-insert-180920/\n\nICJ Wall opinion 2004:\nhttps://www.icj-cij.org/case/131\n\nICJ 2024 occupation opinion:\nhttps://www.icj-cij.org/case/186",

          falseClaim: "\"October 7, 2023 was staged / a false flag — no civilians were really killed.\"",

          category: "Legitimacy & History",
          title: "Jews are indigenous and needed a refuge after the Holocaust",
          israelArgument: "The Jewish people have a 3,000-year connection to the land — Jerusalem, Hebron, and the biblical kingdoms of Israel and Judah. After 2,000 years of exile, pogroms, and the Holocaust — in which six million Jews were systematically murdered while much of the world closed its doors — Israel is the legitimate expression of Jewish self-determination. The UN voted to partition the land in 1947. Israel accepted; the Arabs launched a war to destroy the newborn state. We are not foreign colonizers — we are a people returning to our ancestral homeland, and we have a right to exist as a state like any other nation.",

        {

          israelArgument: "On 7 October 2023, Hamas murdered approximately 1,200 people — babies, elderly, festival-goers — and dragged 250 hostages into tunnels. This is not resistance; it is ISIS-level barbarism. The attackers filmed their atrocities. If we had no military presence, no checkpoints, no blockade — this would happen again and again. Hamas's founding charter calls for the destruction of Israel and killing of Jews. You cannot ask us to lower our guard when our neighbors openly seek our annihilation. Every nation has the right to defend itself — and we will destroy Hamas so this never happens again.",

          title: "Palestinians never had a state — there is no occupation of their land",

          concede: "No sovereign Palestinian state existed before 1967. Jordan and Egypt controlled those areas. The Oslo Accords created interim Palestinian self-rule.",
          yourResponse: "The 'no Palestinian state therefore no occupation' argument is Israel's legal theory — rejected by the ICJ in 2024, the UN, the EU, and the overwhelming majority of states, which recognize Palestinians as a people with self-determination rights in those territories. The West Bank and Gaza are universally referred to in international law as the occupied Palestinian territory (oPt). Jordan renounced claims in 1988; Palestinians are the recognized party in Oslo and at the UN (observer state since 2012). Legal novelty does not override 57 years of military rule over a distinct population without citizenship.",
          sources: "ICJ 2024:\nhttps://www.icj-cij.org/case/186\n\nUN observer state 2012:\nhttps://www.un.org/unispal/document/auto-insert-199590/\n\nOCHA oPt:\nhttps://www.ochaopt.org/page/about-occupied-palestinian-territory",
          pinned: true,
        },
        {
          id: "oa-015",
          category: "Security",
          title: "Iran backs Hamas and Hezbollah — this is a war of civilization",
          israelArgument: "This is not a local property dispute. Iran — the world's leading state sponsor of terrorism — funds Hamas, Hezbollah, and Islamic Jihad with billions of dollars and weapons, explicitly to destroy Israel. Hamas is their proxy. Hezbollah has 150,000 rockets pointed at us. We are the front line of the civilized world against jihadist theocracy. If you criticize Israel while ignoring Iran's role, you are siding with extremists who would massacre every secular person in the region — Muslim, Jewish, or Christian.",
          concede: "Iran does fund Hamas and Hezbollah. Regional proxy conflict is real. Hamas and Iran have stated hostile aims toward Israel.",
          yourResponse: "Iran's role is documented — but it does not erase Palestinian grievances, occupation, or Gaza's conditions. Palestinians under bombardment are not Iranians. Many Palestinians criticize Hamas and oppose Iranian influence. Framing this as 'civilization vs jihad' avoids the territorial and rights issues at the core: refugees, settlements, blockade, and 57 years of occupation documented by UN bodies independent of Iran. You can oppose Iranian theocracy and Israeli occupation simultaneously — they are not mutually exclusive positions.",
          sources: "U.S. State Dept — Iran terror sponsorship:\nhttps://www.state.gov/iran-sanctions/\n\nUN OCHA Gaza:\nhttps://www.ochaopt.org/page/gaza-strip\n\nICG — Hamas-Iran:\nhttps://www.crisisgroup.org/",
          pinned: false,

        {
          id: "oa-016",
          category: "Peace Process",
          title: "After 1967, Arab states said no peace, no recognition, no negotiations",
          israelArgument: "Months after the Six-Day War, the Arab League met in Khartoum and adopted the famous 'Three No's': no peace with Israel, no recognition of Israel, no negotiations with Israel. We had just won a defensive war — and the Arab world's unified response was total rejection, not diplomacy. Egypt eventually made peace in 1979, but for years the message was clear: destroy Israel, don't talk to it. You cannot blame Israel for refusing to withdraw when the other side publicly vowed never to make peace.",
          concede: "The Khartoum Resolution is documented. Egypt broke ranks and signed a peace treaty in 1979. Some Arab states later normalized via the Abraham Accords.",
          yourResponse: "Khartoum is real — cite the text. Then note: (1) it was an Arab League political declaration, not Palestinian policy alone; (2) UNSC 242 (Nov 1967) called for withdrawal and peace — the diplomatic frame existed alongside Khartoum; (3) Egypt's peace proves positions can change; (4) 57 years of occupation and settlement expansion continued long after any 'Three No's' — the legal problem today is ongoing military rule over Palestinians, not 1967 Arab rhetoric alone.",
          sources: "Khartoum Resolution:\nhttps://www.jewishvirtuallibrary.org/khartoum-resolution\n\nUNSCR 242:\nhttps://www.un.org/unispal/document/auto-insert-180914/",
          pinned: false,
        },
        {
          id: "oa-017",
          category: "Legitimacy & History",
          title: "Britain closed Palestine to Holocaust refugees — Israel became the only refuge",
          israelArgument: "In 1939, on the eve of the Holocaust, Britain issued the White Paper capping Jewish immigration to Palestine at 75,000 over five years — effectively closing the door. During the war, millions of Jews were murdered while legal escape routes were blocked. After the war, Holocaust survivors in DP camps were still denied entry — ships like the Exodus 1947 were turned back. Britain had the Mandate and failed catastrophically. Israel is not an abstract colonial project — it is the state that opened the door when the world shut it.",
          concede: "The 1939 White Paper is documented. Britain restricted immigration during and after the Holocaust. Palestinian Arabs opposed mass immigration — that opposition is also documented.",
          yourResponse: "Acknowledge British failure and Holocaust urgency — then separate questions: (1) Does British imperial policy justify displacing Palestinians who already lived there? (2) Post-1948, does refuge status justify 57 years of occupation and settlement? (3) Many Jews reached other countries; Palestine was one destination among pressured options, not the only one for all. The moral weight of Holocaust refuge does not erase Palestinian refugee rights documented by the UN.",
          sources: "White Paper 1939:\nhttps://avalon.law.yale.edu/20th_century/brwh1939.asp\n\nUSHMM — Exodus 1947:\nhttps://www.ushmm.org/collections/bibliography/selected-readings/exodus-1947",
          pinned: false,

        {
          id: "oa-018",
          category: "Legitimacy & History",
          title: "Israel declared independence — the UN did not create the state on May 14",
          israelArgument: "People say 'the UN created Israel with a vote.' That is wrong. Resolution 181 in November 1947 was a non-binding partition recommendation. On 14 May 1948, Israel's provisional government declared independence — that is when the state was founded. The U.S. and USSR recognized Israel within days. Arab states invaded the next day. Israel's legitimacy comes from self-determination, survival in a defensive war, and decades of statehood — not a single UNGA vote that did not itself establish a government or borders.",
          concede: "Resolution 181 provided international diplomatic support for partition. Israel's declaration referenced the UN plan. The legal status of partition remains debated.",
          yourResponse: "This correction is accurate and useful — agree with it. Then add: (1) 181 still matters as the international framework both sides cite; (2) Palestinians were not represented as a sovereign state at the UN; (3) declaration plus war produced the Nakba — ~700,000 refugees per UN; (4) correcting 'UN created Israel' does not settle who should control the West Bank and Gaza today.",
          sources: "Resolution 181:\nhttps://www.un.org/unispal/document/auto-insert-180905/\n\nIsraeli Declaration:\nhttps://www.gov.il/en/departments/guides/declaration_of_independence",

      proPalestineArgs: [
        {
          id: "pa-001",
          category: "Legitimacy & History",
          title: "Palestinians are indigenous — they did not arrive with the British",
          palestineArgument: "Palestinian Arabs have lived in Palestine continuously for centuries — in villages, towns, and cities like Jerusalem, Jaffa, Haifa, Nablus, and Gaza. We are not interchangeable with Egyptians or Jordanians. We had our own economy, culture, newspapers, and political organizations under Ottoman and British rule. When hundreds of thousands of Jewish immigrants arrived under British sponsorship — especially after 1933 — our society was displaced through immigration policy, land purchases, and ultimately war. We did not 'go to other Arab countries' — we were rooted here. Denying Palestinian indigeneity is historical erasure.",
          concede: "Jewish historical and religious ties to the land are real. Some Palestinian nationalist consciousness consolidated in the 20th century, as did Zionism. Not every Palestinian family traces back 2,000 years in one village.",
          yourResponse: "When Israel says 'there was no Palestine': cite Ottoman/British census records and Palestinian institutions pre-1948. Indigeneity does not require a sovereign state — Palestinians existed as a population before Israel existed as a state. The question is equal rights and self-determination today, not who arrived first millennia ago. Pivot to 700,000 refugees documented by the UN and ongoing occupation of their descendants' land.",
          sources: "Institute for Palestine Studies:\nhttps://www.palestine-studies.org/\n\nUNCCP refugees:\nhttps://www.un.org/unispal/document/auto-insert-180907/",
          pinned: true,
        },
        {
          id: "pa-002",
          category: "Legitimacy & History",
          title: "The Nakba was mass expulsion — not a voluntary departure",
          palestineArgument: "In 1948, roughly 700,000 Palestinians fled or were expelled from their homes during the creation of Israel — destroyed villages, massacres like Deir Yassin, and military operations that cleared towns. This is the Nakba — catastrophe. Israel prevented their return, confiscated property under absentee laws, and destroyed hundreds of villages. These refugees and their descendants — now millions — have a moral and legal claim to justice. You cannot ethnically cleanse a population and then call it ancient history.",
          concede: "Some Palestinians fled general fighting without direct expulsion. Arab state invasion followed the declaration of Israel. Complex violence occurred on both sides in 1948.",
          yourResponse: "When they say 'Arabs started it': acknowledge the invasion, then cite UN figure of ~700,000 refugees and documented expulsions by Israeli historians (Benny Morris, Ilan Pappé, official IDF archives). Displacement began before May 15. The refugee problem is not invented — it's UN-documented. Moral claim: return, compensation, or just settlement per international law — not perpetual statelessness.",
          sources: "UNCCP:\nhttps://www.un.org/unispal/document/auto-insert-180907/\n\nBadil:\nhttps://www.badil.org/",
          pinned: true,
        },
        {
          id: "pa-003",
          category: "Occupation & Rights",
          title: "57 years of military occupation denies basic human rights",
          palestineArgument: "Since 1967, Israel has militarily ruled over millions of Palestinians in the West Bank and Gaza without granting them citizenship or equal rights — while Israeli settlers in the same territory live under civil law with full rights. Palestinians face checkpoints, night raids, administrative detention without trial, house demolitions, and land confiscation. The ICJ ruled in 2024 that this occupation is unlawful and must end. Military occupation of a civilian population is supposed to be temporary — 57 years is permanent subjugation by another name.",
          concede: "Israel cites security — suicide bombings killed Israeli civilians. Some security measures reduced attacks. Oslo created limited Palestinian autonomy in parts of the territory.",
          yourResponse: "Security does not permit permanent occupation or apartheid-style legal dualism. Cite ICJ 2024, B'Tselem apartheid report, UN OCHA daily data. Ask: if temporary, when does it end? Settlement growth (~700,000 per Peace Now) proves Israel is entrenching control, not preparing to leave. Palestinians deserve the vote on the government that rules them or independence from it.",
          sources: "ICJ 2024:\nhttps://www.icj-cij.org/case/186\n\nB'Tselem:\nhttps://www.btselem.org/publications/fulltext/202101_this_is_apartheid\n\nOCHA:\nhttps://www.ochaopt.org/",
          pinned: true,
        },
        {
          id: "pa-004",
          category: "Settlements",
          title: "Settlements are illegal land theft — not housing disputes",
          palestineArgument: "Roughly 700,000 Israeli settlers live in the occupied West Bank and East Jerusalem on land taken from Palestinians — in violation of the Fourth Geneva Convention and hundreds of UN resolutions. Settlements are connected by Jews-only bypass roads, protected by the army, and expand continuously. They carve the West Bank into cantons and make a contiguous Palestinian state nearly impossible. This is not 'disputed real estate' — it is state-sponsored colonization condemned by the entire world except Israel.",
          concede: "Israel disputes application of Geneva Convention. Some religious Jews feel deep historical connection to Hebron and other sites. A small number of settlements were removed in Gaza 2005.",
          yourResponse: "Israel's legal theory is rejected by ICJ, UNSC (2334, 446), EU, and virtually all states. Don't argue religion vs law — cite ICJ 2024 and Peace Now maps. Settlements grew during Oslo — proof Israel negotiated while annexing. Every settlement is a fact on the ground against Palestinian statehood.",
          sources: "ICJ 2024:\nhttps://www.icj-cij.org/case/186\n\nPeace Now:\nhttps://peacenow.org.il/en/settlements-watch/settlements-data/population\n\nUNSCR 2334:\nhttps://www.un.org/unispal/document/decl-12-23-2016/",
          pinned: true,
        },
        {
          id: "pa-005",
          category: "Gaza",
          title: "Gaza is an open-air prison — the blockade is collective punishment",
          palestineArgument: "Two million people — half of them children — live in Gaza under a 17-year blockade that restricts food, medicine, fuel, construction materials, and freedom of movement. Israel controls borders, airspace, and waters. Unemployment is among the highest on earth. Periodic wars kill thousands. You do not get to occupy, siege, and bombard a population for decades and then act surprised when armed resistance exists. The blockade punishes all Gazans for Hamas — a collective punishment illegal under international law.",
          concede: "Hamas governs Gaza and has fired rockets at Israeli civilians. Egypt also restricts Rafah crossing. Hamas bears responsibility for governance failures and militarization.",
          yourResponse: "Concede Hamas rockets and Oct 7 — then cite UN OCHA blockade documentation and Gisha access reports. Collective punishment of 2 million for Hamas actions is illegal regardless. Disengagement 2005 did not end control. Ask what legal right Israel has to decide what food and medicine enter Gaza.",
          sources: "UN OCHA blockade:\nhttps://www.ochaopt.org/content/gaza-strip-blockade\n\nGisha:\nhttps://gisha.org/",
          pinned: true,
        },
        {
          id: "pa-006",
          category: "Gaza",
          title: "The Gaza war response has been disproportionate and devastating",
          palestineArgument: "After October 7 — which we can condemn as a war crime against civilians — Israel launched a military campaign that has killed tens of thousands in Gaza, destroyed hospitals, schools, universities, and homes, and displaced nearly the entire population. UN experts have warned of famine and genocide risk. Self-defense has a legal limit: proportionality, distinction between combatants and civilians, and permitting humanitarian aid. Destroying an entire society to destroy Hamas is collective punishment on a scale the world has rarely seen.",
          concede: "October 7 killed ~1,200 Israelis and took hostages — documented. Hamas embeds in urban areas. Israel issues some warnings before strikes. Hostages must be released.",
          yourResponse: "Always condemn Oct 7 first — it's essential for credibility. Then cite UN OCHA casualty figures, HRW investigations, ICJ provisional measures on humanitarian access. Self-defense ≠  unlimited force. Ask for the military objective that justifies this scale of civilian death. Both Hamas crimes and potential Israeli violations can be true.",
          sources: "UN OCHA:\nhttps://www.ochaopt.org/content/hostilities-gaza-strip-and-israel-flash-update\n\nHRW:\nhttps://www.hrw.org/middle-east/north-africa/israel/palestine",
          pinned: true,
        },
        {
          id: "pa-007",
          category: "Refugees",
          title: "Palestinian refugees have a right of return and compensation",
          palestineArgument: "UN Resolution 194 (1948) states refugees wishing to return should be permitted to do so, and compensation should be paid. Roughly 700,000 became refugees in 1948; UNRWA now serves ~6 million because refugee status passes to descendants — as with other refugee regimes. These are people with documented homes in places like Akka, Lydd, and Safad. Return is not 'destroying Israel' — it is international law applied to a documented crime of displacement.",
          concede: "Mass return to Israel proper would dramatically change demographics. Israel rejects return as existential threat. Negotiations have discussed limited return and compensation.",
          yourResponse: "This is hard — don't pretend return is easy. Argue: (1) refugee rights are real under UN 194; (2) Israel's existence is also real — solution requires negotiation (return + compensation + Palestinian state), not shouting; (3) denying all justice to refugees while expanding settlements is not good faith; (4) Palestinian negotiators have discussed phased/limited return — cite Arab Peace Initiative framing.",
          sources: "UN 194 — UNISPAL:\nhttps://www.un.org/unispal/document/auto-insert-180907/\n\nUNRWA:\nhttps://www.unrwa.org/palestine-refugees",
          pinned: true,
        },
        {
          id: "pa-008",
          category: "International Law",
          title: "International law overwhelmingly supports Palestinian claims on occupation",
          palestineArgument: "The UN, ICJ, International Committee of the Red Cross, and virtually every country except Israel consider the West Bank and Gaza occupied Palestinian territory. The ICJ ruled settlements illegal (2004), the wall illegal where it crosses the Green Line, and the entire occupation unlawful (2024). UN Security Council resolutions call for withdrawal. Palestinians have UN non-member observer state status since 2012. This is not 'anti-Semitic UN bias' — it is the global legal consensus on military occupation.",
          concede: "UNGA passes many political resolutions against Israel. Israel has valid security concerns. ICJ advisory opinions are non-binding. Israel disputes jurisdiction.",
          yourResponse: "Separate UNGA politics from ICJ and Geneva Convention — binding legal frameworks Israel is party to. ICJ is the world's highest court. UNSC 242, 446, 2334 are not Facebook posts. Israel's rejection does not erase consensus. Ask: name one other occupation where the occupier builds 700,000 settlements and claims legality.",
          sources: "ICJ 2024:\nhttps://www.icj-cij.org/case/186\n\nUN observer state:\nhttps://www.un.org/unispal/document/auto-insert-199590/",
          pinned: false,
        },
        {
          id: "pa-009",
          category: "Peace Process",
          title: "Oslo failed because settlements doubled — not Palestinian bad faith alone",
          palestineArgument: "The 1993 Oslo Accords promised interim self-rule leading to a final Palestinian state. Instead, settler population in the occupied territories roughly tripled since Oslo. Palestinian land was confiscated, bypass roads built, and Area C (60% of the West Bank) kept under full Israeli control. You cannot negotiate a two-state solution while actively colonizing the other state. Palestinians are blamed for rejecting 'generous offers' — but every offer left settlement blocs, lacked contiguity, and deferred refugees.",
          concede: "Palestinian violence during Oslo period harmed trust. Arafat's leadership had corruption issues. Camp David 2000 failed with mutual blame. Second Intifada killed Israeli civilians.",
          yourResponse: "Don't deny intifada or failed leadership — cite B'Tselem for Israeli deaths. Then cite Peace Now settlement growth data during Oslo years. Barak's '90% offer' is disputed by Palestinian negotiators and Ben-Ami himself. Accurate line: both sides failed; Israel's settlement enterprise made a viable state increasingly impossible — that's documented in EU and UN reports.",
          sources: "Oslo — UNISPAL:\nhttps://www.un.org/unispal/document/auto-insert-180916/\n\nPeace Now:\nhttps://peacenow.org.il/en/settlements-watch",
          pinned: false,
        },
        {
          id: "pa-010",
          category: "Occupation & Rights",
          title: "The system is apartheid — two legal regimes, one territory",
          palestineArgument: "In the occupied territories, Israeli settlers live under civilian law with full rights while Palestinians live under military law — different roads, courts, water access, and building permits in the same land. Human Rights Watch, Amnesty International, and B'Tselem (an Israeli organization) have concluded this meets the legal definition of apartheid: systematic oppression to maintain domination by one group over another. This is not name-calling — it is legal analysis by major human rights bodies.",
          concede: "Israel rejects the apartheid label. Arab citizens inside Israel have voting rights (with inequality documented by Adalah). The term is politically charged in the U.S.",
          yourResponse: "Focus on the legal criteria HRW/B'Tselem document — not the word's emotional weight. Inside Green Line vs occupied territory: argue apartheid analysis targets the regime over Palestinians under occupation, not every social interaction in Israel. Cite specific laws: Nation-State Law, land policies, separate legal systems in WB.",
          sources: "B'Tselem apartheid report:\nhttps://www.btselem.org/publications/fulltext/202101_this_is_apartheid\n\nHRW:\nhttps://www.hrw.org/report/2021/04/27/threshold-crossed/israeli-authorities-and-crimes-apartheid-and-persecution",
          pinned: false,
        },
        {
          id: "pa-011",
          category: "Legitimacy & History",
          title: "Palestinians had no voice in the 1947 partition of their homeland",
          palestineArgument: "In 1947, the UN voted to partition Palestine — a land where Palestinians were two-thirds of the population and owned most of the private land — into a Jewish state and an Arab state. Palestinian representatives were not sovereign members of the UN. The plan gave roughly 56% of the land to the Jewish state despite Jews being ~33% of the population. Palestinians and Arab states rejected it as unjust — then lost more land in war. You cannot call this democratic self-determination when the majority population was never properly consulted.",
          concede: "Zionist leadership accepted the plan. Jewish population included Holocaust survivors needing refuge. UN vote was legal under UN Charter procedures.",
          yourResponse: "Acknowledge Holocaust refuge and UN procedure — then cite demographic facts from UN partition documents. Palestinian rejection is framed as irrational only if you ignore they lost majority status in their homeland. Partition recommendation was non-binding; what followed was war and Nakba — not simple 'acceptance of UN law.'",
          sources: "UN Resolution 181:\nhttps://www.un.org/unispal/document/auto-insert-180905/\n\nUN vote record:\nhttps://www.un.org/unispal/document/auto-insert-180906/",
          pinned: false,
        },
        {
          id: "pa-012",
          category: "International Law",
          title: "East Jerusalem is illegally annexed occupied territory",
          palestineArgument: "East Jerusalem — including the Old City, Al-Aqsa, and Palestinian neighborhoods like Sheikh Jarrah and Silwan — was captured in 1967 and annexed by Israel in 1980. The UN Security Council unanimously declared annexation null and void (Resolution 478). Palestinians in East Jerusalem are residents, not citizens — subject to home demolitions and settlement encroachment. No country recognizes Israeli sovereignty over East Jerusalem except the U.S. since 2017.",
          concede: "Jerusalem is holy to Jews, Christians, and Muslims. Israel unified city services. U.S. moved embassy in 2017—2018.",
          yourResponse: "Religious significance doesn't determine sovereignty under international law. Cite UNSC 478 and UN position that East Jerusalem is occupied. Sheikh Jarrah evictions are documented by NGOs. Final status was supposed to be negotiated — unilateral annexation preempts peace.",
          sources: "UNSCR 478:\nhttps://www.un.org/unispal/document/auto-insert-180921/\n\nOCHA East Jerusalem:\nhttps://www.ochaopt.org/content/east-jerusalem",
          pinned: false,
        },
        {
          id: "pa-013",
          category: "Occupation & Rights",
          title: "Palestinian children are detained and prosecuted in military courts",
          palestineArgument: "Israel prosecutes hundreds of Palestinian children each year in military courts — not civilian courts like Israeli children. UNICEF and human rights groups document night arrests, blindfolding, coerced confessions, and detention without proper legal protections. This is a systematic feature of occupation, not isolated incidents. No democracy subjects an entire subject population's children to military justice.",
          concede: "Some minors throw stones or participate in unrest. Israel cites security. Reforms have been discussed.",
          yourResponse: "Stone-throwing does not justify systemic military detention of children. Cite UNICEF, B'Tselem, Military Court Watch reports. Contrast with settler violence often handled in civilian courts with lighter sentences — documented by Yesh Din.",
          sources: "UNICEF — children in military detention:\nhttps://www.unicef.org/occupiedpalestinianterritory/children-in-israeli-military-detention\n\nB'Tselem:\nhttps://www.btselem.org/topic/minors",
          pinned: false,
        },
        {
          id: "pa-014",
          category: "Peace Process",
          title: "A two-state solution is dying because of Israeli policy — not Palestinian rejection alone",
          palestineArgument: "Every year, more settlements, more demolitions, more land confiscation — while politicians say they support two states. Netanyahu's governments have explicitly opposed Palestinian sovereignty. The West Bank is sliced into Areas A, B, and C with 60% under full Israeli control. If you genuinely want two states, you freeze settlements and negotiate borders — Israel has done the opposite for decades. Palestinians still officially support two states in polls — Israel's actions are killing the option.",
          concede: "Hamas rejects two states in practice. Palestinian political division hurts negotiations. Some Palestinian factions reject Israel's existence.",
          yourResponse: "Concede Hamas and factionalism — then cite Peace Now, EU settlement reports, and Netanyahu statements on opposition to Palestinian statehood. PA under Abbas still negotiates on two-state basis. Argue: judge by actions — 700,000 settlers is a one-state reality being built on the ground.",
          sources: "Peace Now:\nhttps://peacenow.org.il/en/settlements-watch\n\nEU settlement report:\nhttps://www.eeas.europa.eu/",
          pinned: false,
        },
        {
          id: "pa-015",
          category: "Gaza",
          title: "Palestinian resistance is a response to decades of violence and dispossession",
          palestineArgument: "International law recognizes peoples' right to self-determination and, under certain conditions, resistance to occupation. Palestinians have faced dispossession, occupation, blockade, and repeated bombardment for 75+ years. Armed resistance — including during the First and Second Intifadas — emerged from conditions of subjugation. This does not justify every attack on civilians (Oct 7 was a war crime), but it explains why militancy persists: diplomacy has failed, settlements expand, and Gaza is strangled.",
          concede: "Attacks targeting Israeli civilians are war crimes under international law — full stop. Oct 7, suicide bombings, and rocket fire on cities are indefensible. Many Palestinians oppose violence.",
          yourResponse: "Never use this argument to excuse Oct 7 or suicide bombings — condemn first. Use it to explain context vs justification. Cite UN resolutions on self-determination. Distinguish resistance to military targets vs civilians — only the former has any legal debate, and even that is contested. Pivot: if Israel wants to end resistance, end the conditions that produce it — occupation, blockade, settlements.",
          sources: "UN self-determination:\nhttps://www.un.org/unispal/\n\nHRW on laws of war:\nhttps://www.hrw.org/",
          pinned: false,
        },
        {
          id: "pa-016",
          category: "Peace Process",
          title: "Hamas won the 2006 elections — that is documented",
          palestineArgument: "In January 2006, Hamas won 74 of 132 seats in the Palestinian Legislative Council — the first parliamentary elections since 1996. International observers, including the EU mission, certified the vote. Palestinians voted against Fatah corruption and failure to deliver independence — not necessarily for endless war. Since then, no national Palestinian elections have been held. Denying or distorting the 2006 result makes you sound uninformed.",
          concede: "Hamas charter called for Israel's destruction (later amended rhetoric). International donors cut aid after the win. Fatah refused to cede security control. The election did not produce stable governance.",
          yourResponse: "Concede governance failures and Hamas's record — then hold the fact: Hamas won a certified election. Israel and the Quartet reacted with sanctions and isolation, not engagement. Ask: if democracy matters, why was the result rejected? Distinguish 'Hamas won votes' from 'all Palestinians support Oct 7' — they are not the same claim.",
          sources: "EU election observation report:\nhttps://www.eeas.europa.eu/sites/default/files/eueompalestinianlegislativecouncil2006_en.pdf\n\nCarnegie analysis:\nhttps://carnegieendowment.org/posts/2006/01/hamas-wins-the-elections-now-what",
          pinned: false,
        },
        {
          id: "pa-017",
          category: "Peace Process",
          title: "There is no single 'Palestinian leadership' — Fatah and Hamas split Gaza and the West Bank",
          palestineArgument: "Since June 2007, Hamas has governed Gaza while the Palestinian Authority under Mahmoud Abbas administers parts of the West Bank. Treating 'the Palestinians' as one monolithic actor — or blaming all Palestinians for Hamas — is lazy and inaccurate. Abbas negotiates with Israel; Hamas does not. Gazans cannot vote out the blockade. West Bank Palestinians live under PA civil rule plus Israeli military occupation. Debates collapse when they ignore this split.",
          concede: "Hamas controls Gaza militarily. PA security coordinates with Israel in the West Bank — controversial among Palestinians. Neither faction has a democratic mandate from recent national elections.",
          yourResponse: "Use this to deflect bad-faith generalizations ('Palestinians elected Hamas so they deserve it'). Cite the 2007 split and different conditions in WB vs Gaza. Argue: collective punishment of all Gazans for Hamas is illegal regardless of who governs. Ask opponents to be precise about which leadership, territory, and policy they mean.",
          sources: "International Crisis Group — Gaza split:\nhttps://www.crisisgroup.org/middle-east-north-africa/east-mediterranean-mena/israelpalestine\n\nUN OCHA — internal divide:\nhttps://www.ochaopt.org/content/humanitarian-impact-palestinian-internal-divide",
          pinned: false,
        },
        {
          id: "pa-018",
          category: "Legitimacy & History",
          title: "Displacement began before Arab states invaded on 15 May 1948",
          palestineArgument: "A common talking point treats all Palestinian flight as a consequence of the Arab invasion on 15 May 1948. The record is more complex: violence and displacement escalated from November 1947 onward, after the partition vote and before Israel's declaration of independence. By May, hundreds of thousands had already left or been expelled. Both the invasion and pre-invasion displacement are documented — collapsing the timeline erases the Nakba.",
          concede: "Arab states invaded after Israel declared independence. Some Palestinians fled without direct expulsion. Violence occurred on multiple sides during the civil war phase.",
          yourResponse: "When they say 'Arabs started it, refugees left because of war': acknowledge the invasion date, then cite UN refugee figures (~700,000) and historians documenting pre-May displacement. The point is chronological accuracy, not absolving all Arab leadership decisions. Pivot to refugee rights today — not perpetual statelessness as punishment for 1948.",
          sources: "UNCCP refugees:\nhttps://www.un.org/unispal/document/auto-insert-180907/\n\nICRC 1948 archives:\nhttps://www.icrc.org/en/doc/archives/1948-1949-israel-and-occupied-territories",
          pinned: true,
        },
        {
          id: "pa-019",

      glossary: [
        { id: "gl-001", term: "Nakba", category: "Historical terms", definition: "Arabic for 'catastrophe.' Palestinians use it to describe the 1948 war and the displacement of roughly 700,000 Palestinians from their homes during the creation of Israel. It is a foundational event in Palestinian national memory.", usageNote: "Israeli discourse often uses 'War of Independence' for the same period. In debates, define the term rather than assume agreement on what happened.", sources: "UNCCP refugee data:\nhttps://www.un.org/unispal/document/auto-insert-180907/", pinned: true },
        { id: "gl-002", term: "Intifada", category: "Historical terms", definition: "Arabic for 'shaking off' — a Palestinian uprising against Israeli rule. The First Intifada (1987—1993) was largely stones and civil disobedience; the Second Intifada (2000—2005) was far more lethal, including suicide bombings and major Israeli military operations.", usageNote: "Often mistranslated as 'riot.' Distinguish First vs Second — they were very different in scale and methods.", sources: "B'Tselem — intifada fatalities:\nhttps://www.btselem.org/statistics/fatalities", pinned: true },
        { id: "gl-003", term: "Occupation", category: "Legal", definition: "Military control by one state over territory outside its sovereign borders. Since 1967, Israel has occupied the West Bank, Gaza, and East Jerusalem. The ICJ (2024) ruled Israel's continued presence unlawful. Israel disputes the term for Gaza post-2005.", usageNote: "Debates often fight over the word before the facts. Cite ICJ, UN, and OCHA for the international legal consensus.", sources: "ICJ 2024:\nhttps://www.icj-cij.org/case/186\n\nOCHA:\nhttps://www.ochaopt.org/", pinned: true },
        { id: "gl-004", term: "Settlements", category: "Legal", definition: "Israeli civilian communities built in the occupied West Bank and East Jerusalem. ~700,000 settlers live there. The UN, ICJ, and virtually all states consider them illegal under the Fourth Geneva Convention. Israel disputes this.", usageNote: "Not the same as settlements inside Israel pre-1967. 'Settlement' vs 'neighborhood' is a political word choice.", sources: "Peace Now:\nhttps://peacenow.org.il/en/settlements-watch\n\nUNSCR 446:\nhttps://www.un.org/unispal/", pinned: true },
        { id: "gl-005", term: "Green Line", category: "Geography", definition: "The 1949 armistice lines between Israel and its neighbors — the pre-1967 borders. It separates Israel from the West Bank and Gaza. These were ceasefire lines, not mutually agreed permanent borders.", usageNote: "Often called 'pre-1967 borders' or '1967 lines.' Basis for most two-state proposals.", sources: "UNISPAL armistice:\nhttps://www.un.org/unispal/document/auto-insert-180908/", pinned: false },
        { id: "gl-006", term: "Zionism", category: "Historical terms", definition: "A political movement advocating a national home for the Jewish people, historically focused on Palestine/Israel. Modern Zionism ranges from secular to religious, left-wing to right-wing. Not all Jews are Zionists; not all Zionists support occupation or settlements.", usageNote: "Often conflated with racism or colonialism in debates — or treated as identical to Israeli government policy. Define the term precisely.", sources: "Britannica — Zionism:\nhttps://www.britannica.com/topic/Zionism", pinned: false },
        { id: "gl-007", term: "Apartheid", category: "Legal", definition: "A crime against humanity under international law (Rome Statute): systematic oppression and domination by one racial/ethnic group over another. B'Tselem, HRW, and Amnesty have applied the term to Israeli rule over Palestinians; Israel and allies reject it.", usageNote: "Legal term with specific criteria — not just 'bad racism.' If you use it, cite the legal reports. If you reject it, engage the criteria rather than just the label.", sources: "B'Tselem report:\nhttps://www.btselem.org/publications/fulltext/202101_this_is_apartheid\n\nHRW:\nhttps://www.hrw.org/report/2021/04/27/threshold-crossed/israeli-authorities-and-crimes-apartheid-and-persecution", pinned: true },
        { id: "gl-008", term: "Right of return", category: "Legal", definition: "Palestinian claim that refugees from 1948 and their descendants should be allowed to return to homes in what is now Israel, based partly on UN Resolution 194. Israel rejects mass return as threatening its Jewish demographic majority.", usageNote: "One of the hardest final-status issues. Distinguish legal/moral claim from practical negotiation positions.", sources: "UN 194:\nhttps://www.un.org/unispal/\n\nUNRWA:\nhttps://www.unrwa.org/palestine-refugees", pinned: false },
        { id: "gl-009", term: "Two-state solution", category: "Political groups", definition: "A peace framework envisioning an independent Palestinian state alongside Israel, roughly along 1967 lines with land swaps. Official position of the PA, most of the world, and historically most Israeli governments — though current Israeli leadership has opposed Palestinian statehood.", usageNote: "Often declared 'dead' because of settlements. Distinguish official policy from on-the-ground reality.", sources: "UN two-state support:\nhttps://www.un.org/unispal/\n\nOslo Accords:\nhttps://www.un.org/unispal/document/auto-insert-180916/", pinned: false },
        { id: "gl-010", term: "Oslo Accords", category: "Historical terms", definition: "1993 agreements between Israel and the PLO establishing mutual recognition and interim Palestinian self-rule (the PA). Final-status issues — borders, Jerusalem, refugees, settlements — were deferred for later negotiation.", usageNote: "Did not create a Palestinian state — created interim autonomy. Settlements continued to expand after signing.", sources: "UNISPAL:\nhttps://www.un.org/unispal/document/auto-insert-180916/", pinned: false },
        { id: "gl-011", term: "Hamas", category: "Political groups", definition: "Palestinian Islamist movement founded 1987. Won 2006 legislative elections. Has governed Gaza since 2007. Designated a terrorist organization by the US, EU, and Israel. Conducted October 7, 2023 attacks. Also runs social services in Gaza.", usageNote: "Not all Palestinians support Hamas. Do not equate Hamas with all Palestinians or all Gazans.", sources: "EU election report 2006:\nhttps://www.eeas.europa.eu/\n\nHRW Oct 7:\nhttps://www.hrw.org/", pinned: true },
        { id: "gl-012", term: "Palestinian Authority (PA)", category: "Political groups", definition: "Interim self-governing body established 1994 under Oslo, led by Mahmoud Abbas (Fatah). Administers parts of the West Bank. Lost control of Gaza to Hamas in 2007. Not a sovereign state — operates under ongoing occupation.", usageNote: "Often incorrectly called 'the Palestinian government' as if sovereign. Limited to Areas A and B in West Bank.", sources: "Oslo Gaza-Jericho:\nhttps://www.un.org/unispal/document/auto-insert-180917/", pinned: false },
        { id: "gl-013", term: "Blockade (Gaza)", category: "Military & security", definition: "Israeli and Egyptian restrictions on movement of people and goods into and out of Gaza since Hamas took power in 2007. Israel cites security (weapons); critics call it collective punishment. UN documents severe humanitarian impact.", usageNote: "Different from occupation debate — blockade restricts flow; Israel still controls borders, airspace, and waters.", sources: "UN OCHA:\nhttps://www.ochaopt.org/content/gaza-strip-blockade", pinned: false },
        { id: "gl-014", term: "Areas A, B, and C", category: "Geography", definition: "West Bank zones from Oslo II (1995). Area A: PA civil/security control (cities). Area B: PA civil, Israeli security. Area C: full Israeli control — ~60% of West Bank, including settlements and most empty land.", usageNote: "Key for explaining why Palestinians lack sovereignty despite 'autonomy.' Most Palestinians live in A and B; most land is C.", sources: "UN OCHA Area C:\nhttps://www.ochaopt.org/content/area-c", pinned: false },
        { id: "gl-015", term: "UNRWA", category: "Humanitarian", definition: "UN Relief and Works Agency for Palestine Refugees — created 1949 to aid refugees from 1948 war. Serves ~6 million registered refugees in camps across Jordan, Lebanon, Syria, West Bank, and Gaza. Its refugee definition includes descendants.", usageNote: "Politically contested by Israel and US Republicans. Distinct from UNHCR. Do not confuse 'registered refugees' with people currently in camps only.", sources: "UNRWA:\nhttps://www.unrwa.org/palestine-refugees", pinned: false },
        { id: "gl-016", term: "Fourth Geneva Convention", category: "Legal", definition: "1949 international treaty protecting civilians under military occupation. Prohibits transferring an occupier's population into occupied territory (applied to settlements) and requires humane treatment of protected persons. Israel disputes its application to the West Bank.", usageNote: "Core legal framework Palestinians and UN cite. Israel argues Geneva doesn't apply or settlements are exceptional.", sources: "ICRC Geneva IV:\nhttps://www.icrc.org/en/doc/resources/documents/misc/5nje2m.htm", pinned: false },
        { id: "gl-017", term: "Ethnic cleansing", category: "Legal", definition: "Forcible removal of an ethnic or religious group from a territory. Palestinians apply it to 1948 displacement; some Israeli historians document expulsions. A charged legal/moral term — use only with specific evidence, not as a blanket slogan.", usageNote: "Highly inflammatory. If used, cite specific operations and historians. Israel denies systematic ethnic cleansing; New Historians document some expulsions.", sources: "UNCCP:\nhttps://www.un.org/unispal/document/auto-insert-180907/", pinned: false },
        { id: "gl-018", term: "Self-determination", category: "Legal", definition: "The right of peoples to freely determine their political status — a core principle of international law. Palestinians cite it for statehood; Israelis cite it for Jewish national self-determination in Israel.", usageNote: "Both sides use this term. Debates are about whose self-determination takes priority and whether they are mutually exclusive.", sources: "UN Charter:\nhttps://www.un.org/en/about-us/un-charter", pinned: false },

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function linkify(text) {
      const escaped = escapeHtml(text);
      return escaped.replace(
        /(https?:\/\/[^\s<]+)/g,
        '<a href="$1" target="_blank" rel="noopener">$1</a>'
      );
    }

    function highlight(text, q) {
      if (!q) return linkify(text);
      const parts = text.split(new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi"));
      return parts.map((p, i) =>
        i % 2 === 1 ? `<span class="highlight">${escapeHtml(p)}</span>` : linkify(p)
      ).join("");
    }

    function matches(text, q) {
      return !q || text.toLowerCase().includes(q.toLowerCase());
    }

    function formatDate(dateStr) {
      if (!dateStr) return "—";
      const d = new Date(dateStr + "T12:00:00");
      if (isNaN(d)) return dateStr;
      return d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
    }

      return [...events].sort((a, b) => {

        return (a.date || "").localeCompare(b.date || "");
      });
    }

    function bindActions() {
      document.querySelectorAll("[data-act]").forEach((btn) => {
        btn.onclick = () => {
          const { act, id } = btn.dataset;
          const view = data.view;

          if (act === "pin") {
            if (view === "timeline") {
              const e = data.events.find((x) => x.id === id);
              if (e) e.pinned = !e.pinned;
            } else if (view === "quickstats") {
              const e = data.quickStats.find((x) => x.id === id);
              if (e) e.pinned = !e.pinned;
            } else if (view === "proisrael" || view === "propalestine") {
              const cfg = getSideConfig(view);
              const e = data[cfg.dataKey].find((x) => x.id === id);
              if (e) e.pinned = !e.pinned;
            } else if (view === "palestiniandeaths" || view === "israelideaths") {
              const cfg = getMemorialConfig(view);
              const e = data[cfg.dataKey].find((x) => x.id === id);
              if (e) e.pinned = !e.pinned;
            } else if (view === "glossary") {
              const e = data.glossary.find((x) => x.id === id);
              if (e) e.pinned = !e.pinned;
            } else if (view === "parallels") {
              const e = data.parallels.find((x) => x.id === id);
              if (e) e.pinned = !e.pinned;
            } else {
              const e = data.factChecks.find((x) => x.id === id);
              if (e) e.pinned = !e.pinned;
            }
            save(); render();
          } else if (act === "copy") {
            if (view === "proisrael" || view === "propalestine") {
              const cfg = getSideConfig(view);
              const o = data[cfg.dataKey].find((x) => x.id === id);
              if (o) navigator.clipboard.writeText(o[cfg.copyField]);
            } else if (view === "palestiniandeaths" || view === "israelideaths") {
              const cfg = getMemorialConfig(view);
              const m = data[cfg.dataKey].find((x) => x.id === id);
              if (m) navigator.clipboard.writeText(memorialCopyText(m));
            } else if (view === "glossary") {
              const g = data.glossary.find((x) => x.id === id);
              if (g) navigator.clipboard.writeText(g.term + ": " + g.definition);
            } else if (view === "parallels") {
              const p = data.parallels.find((x) => x.id === id);
              if (p) navigator.clipboard.writeText(p.title + " — Parallel: " + p.parallel + " Differences: " + p.differences);
            } else {
              const s = data.quickStats.find((x) => x.id === id);
              if (s) navigator.clipboard.writeText(s.citeLine);
            }
          } else if (act === "edit") {
            openModal(id);
          } else if (act === "delete") {
            if (!confirm("Delete this entry?")) return;
            if (view === "timeline") data.events = data.events.filter((x) => x.id !== id);
            else if (view === "factcheck") data.factChecks = data.factChecks.filter((x) => x.id !== id);
            else if (view === "quickstats") data.quickStats = data.quickStats.filter((x) => x.id !== id);
            else if (view === "proisrael" || view === "propalestine") {
              const cfg = getSideConfig(view);
              data[cfg.dataKey] = data[cfg.dataKey].filter((x) => x.id !== id);
            } else if (view === "palestiniandeaths" || view === "israelideaths") {
              const cfg = getMemorialConfig(view);
              data[cfg.dataKey] = data[cfg.dataKey].filter((x) => x.id !== id);
            } else if (view === "glossary") {
              data.glossary = data.glossary.filter((x) => x.id !== id);
            } else if (view === "parallels") {
              data.parallels = data.parallels.filter((x) => x.id !== id);
            } else data.sourceBookmarks = data.sourceBookmarks.filter((x) => x.id !== id);
            save(); render();
          }
        };
      });
    }
