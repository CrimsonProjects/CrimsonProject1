      } else if (view === "palestiniandeaths" || view === "israelideaths") {
        const cfg = getMemorialConfig(view);
        const m = id ? data[cfg.dataKey].find((e) => e.id === id) : null;
        body.innerHTML = `
          <h3>${m ? "Edit" : "Add"} Memorial Entry</h3>
          <label>Name or event title</label>
          <input id="f-name" type="text" value="${escapeHtml(m?.name || "")}" placeholder="e.g. Shireen Abu Akleh" />
          <label>Date</label>
          <input id="f-date" type="date" value="${m?.date || ""}" />
          <label>Category</label>
          <select id="f-category">${MEMORIAL_CATEGORIES.map((c) => `<option ${m?.category === c ? "selected" : ""}>${c}</option>`).join("")}</select>
          <label>Who they were</label>
          <textarea id="f-bio" placeholder="Brief background — who was this person?">${escapeHtml(m?.bio || "")}</textarea>
          <label>What happened (documented facts)</label>
          <textarea id="f-circumstances" style="min-height:110px" placeholder="Circumstances of death — stick to sourced facts.">${escapeHtml(m?.circumstances || "")}</textarea>
          <label>Sources</label>
          <textarea id="f-sources" placeholder="URLs or citations...">${escapeHtml(m?.sources || "")}</textarea>
          <div class="modal-footer">
            <button class="btn" id="modal-cancel" type="button">Cancel</button>
            <button class="btn btn-primary" id="modal-save" type="button">Save</button>
          </div>
        `;
      } else if (view === "glossary") {
        const g = id ? data.glossary.find((e) => e.id === id) : null;
        body.innerHTML = `
          <h3>${g ? "Edit Term" : "Add Term"}</h3>
          <label>Term</label>
          <input id="f-term" type="text" value="${escapeHtml(g?.term || "")}" placeholder="e.g. Nakba, Occupation..." />
          <label>Category</label>
          <select id="f-category">${GLOSSARY_CATEGORIES.map((c) => `<option ${g?.category === c ? "selected" : ""}>${c}</option>`).join("")}</select>
          <label>Definition</label>
          <textarea id="f-definition" style="min-height:100px">${escapeHtml(g?.definition || "")}</textarea>
          <label>Debate usage note (optional)</label>
          <textarea id="f-usage" placeholder="How this term is used or misused in arguments...">${escapeHtml(g?.usageNote || "")}</textarea>
          <label>Sources (optional)</label>
          <textarea id="f-sources">${escapeHtml(g?.sources || "")}</textarea>
          <div class="modal-footer">
            <button class="btn" id="modal-cancel" type="button">Cancel</button>
            <button class="btn btn-primary" id="modal-save" type="button">Save</button>
          </div>
        `;
      } else if (view === "parallels") {
        const p = id ? data.parallels.find((e) => e.id === id) : null;
        body.innerHTML = `
          <h3>${p ? "Edit Parallel" : "Add Historical Parallel"}</h3>
          <label>Title</label>
          <input id="f-title" type="text" value="${escapeHtml(p?.title || "")}" placeholder="e.g. Apartheid South Africa" />
          <label>Time period</label>
          <input id="f-period" type="text" value="${escapeHtml(p?.period || "")}" placeholder="e.g. 1948—1994" />
          <label>Category</label>
          <select id="f-category">${PARALLEL_CATEGORIES.map((c) => `<option ${p?.category === c ? "selected" : ""}>${c}</option>`).join("")}</select>
          <label>What happened (summary)</label>
          <textarea id="f-summary" style="min-height:90px">${escapeHtml(p?.summary || "")}</textarea>
          <label>Parallel to Israel-Palestine</label>
          <textarea id="f-parallel" style="min-height:90px">${escapeHtml(p?.parallel || "")}</textarea>
          <label>Key differences (important!)</label>
          <textarea id="f-differences" style="min-height:90px">${escapeHtml(p?.differences || "")}</textarea>
          <label>Sources</label>
          <textarea id="f-sources">${escapeHtml(p?.sources || "")}</textarea>
          <div class="modal-footer">
            <button class="btn" id="modal-cancel" type="button">Cancel</button>
            <button class="btn btn-primary" id="modal-save" type="button">Save</button>
          </div>
        `;
      }

      modal.classList.add("open");
      document.getElementById("modal-cancel").onclick = closeModal;
      document.getElementById("modal-save").onclick = saveModal;
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("open");
      editing = null;
    }

    function saveModal() {
      const view = data.view;

      if (view === "timeline") {
        const date = document.getElementById("f-date").value;
        const era = document.getElementById("f-era").value;
        const title = document.getElementById("f-title").value.trim();
        const summary = document.getElementById("f-summary").value.trim();
        const sources = document.getElementById("f-sources").value.trim();
        if (!date || !title || !summary) { alert("Date, title, and summary are required."); return; }
        if (!sources) { alert("Add at least one source — this is the most important field for debates."); return; }

        if (editing) {
          const ev = data.events.find((e) => e.id === editing);
          Object.assign(ev, { date, era, title, summary, sources });
          delete ev.debateNotes;
        } else {
          data.events.push({ id: crypto.randomUUID(), date, era, title, summary, sources, pinned: false });
        }
      } else if (view === "factcheck") {
        const falseClaim = document.getElementById("f-claim").value.trim();
        const correction = document.getElementById("f-correction").value.trim();
        const sources = document.getElementById("f-sources").value.trim();
        if (!falseClaim || !correction) { alert("Claim and correction are required."); return; }
        if (!sources) { alert("Add sources for your correction."); return; }

        if (editing) {
          Object.assign(data.factChecks.find((e) => e.id === editing), { falseClaim, correction, sources });
        } else {
          data.factChecks.push({ id: crypto.randomUUID(), falseClaim, correction, sources, pinned: false });
        }
      } else if (view === "sources") {
        const name = document.getElementById("f-name").value.trim();
        const type = document.getElementById("f-type").value;
        const url = document.getElementById("f-url").value.trim();
        const notes = document.getElementById("f-notes").value.trim();
        if (!name || !url) { alert("Name and URL are required."); return; }

        if (editing) {
          Object.assign(data.sourceBookmarks.find((e) => e.id === editing), { name, type, url, notes });
        } else {
          data.sourceBookmarks.push({ id: crypto.randomUUID(), name, type, url, notes });
        }
      } else if (view === "quickstats") {
        if (!data.quickStats) data.quickStats = [];
        const category = document.getElementById("f-category").value;
        const stat = document.getElementById("f-stat").value.trim();
        const label = document.getElementById("f-label").value.trim();
        const citeLine = document.getElementById("f-cite").value.trim();
        const source = document.getElementById("f-source").value.trim();
        const asOf = document.getElementById("f-asof").value.trim();
        if (!stat || !label || !citeLine) { alert("Figure, label, and debate sentence are required."); return; }
        if (!source) { alert("Add a source for this stat."); return; }

        if (editing) {
          Object.assign(data.quickStats.find((e) => e.id === editing), { category, stat, label, citeLine, source, asOf });
        } else {
          data.quickStats.push({ id: crypto.randomUUID(), category, stat, label, citeLine, source, asOf, pinned: false });
        }
      } else if (view === "proisrael" || view === "propalestine") {
        const cfg = getSideConfig(view);
        if (!data[cfg.dataKey]) data[cfg.dataKey] = [];
        const category = document.getElementById("f-category").value;
        const title = document.getElementById("f-title").value.trim();
        const sideArg = document.getElementById("f-side-arg").value.trim();
        const concede = document.getElementById("f-concede").value.trim();
        const yourResponse = document.getElementById("f-response").value.trim();
        const sources = document.getElementById("f-sources").value.trim();
        if (!title || !sideArg || !yourResponse) { alert("Title, main argument, and rebuttal are required."); return; }
        if (!sources) { alert("Add sources."); return; }

        const entry = { category, title, concede, yourResponse, sources, pinned: false };
        entry[cfg.argField] = sideArg;

        if (editing) {
          Object.assign(data[cfg.dataKey].find((e) => e.id === editing), entry);
        } else {
          data[cfg.dataKey].push({ id: crypto.randomUUID(), ...entry });
        }
      } else if (view === "palestiniandeaths" || view === "israelideaths") {
        const cfg = getMemorialConfig(view);
        if (!data[cfg.dataKey]) data[cfg.dataKey] = [];
        const name = document.getElementById("f-name").value.trim();
        const date = document.getElementById("f-date").value;
        const category = document.getElementById("f-category").value;
        const bio = document.getElementById("f-bio").value.trim();
        const circumstances = document.getElementById("f-circumstances").value.trim();
        const sources = document.getElementById("f-sources").value.trim();
        if (!name || !date || !bio || !circumstances) { alert("Name, date, bio, and circumstances are required."); return; }
        if (!sources) { alert("Add at least one source."); return; }

        if (editing) {
          Object.assign(data[cfg.dataKey].find((e) => e.id === editing), { name, date, category, bio, circumstances, sources });
        } else {
          data[cfg.dataKey].push({ id: crypto.randomUUID(), name, date, category, bio, circumstances, sources, pinned: false });
        }
      } else if (view === "glossary") {
        if (!data.glossary) data.glossary = [];
        const term = document.getElementById("f-term").value.trim();
        const category = document.getElementById("f-category").value;
        const definition = document.getElementById("f-definition").value.trim();
        const usageNote = document.getElementById("f-usage").value.trim();
        const sources = document.getElementById("f-sources").value.trim();
        if (!term || !definition) { alert("Term and definition are required."); return; }

        if (editing) {
          Object.assign(data.glossary.find((e) => e.id === editing), { term, category, definition, usageNote, sources });
        } else {
          data.glossary.push({ id: crypto.randomUUID(), term, category, definition, usageNote, sources, pinned: false });
        }
      } else if (view === "parallels") {
        if (!data.parallels) data.parallels = [];
        const title = document.getElementById("f-title").value.trim();
        const period = document.getElementById("f-period").value.trim();
        const category = document.getElementById("f-category").value;
        const summary = document.getElementById("f-summary").value.trim();
        const parallel = document.getElementById("f-parallel").value.trim();
        const differences = document.getElementById("f-differences").value.trim();
        const sources = document.getElementById("f-sources").value.trim();
        if (!title || !summary || !parallel || !differences) { alert("Title, summary, parallel, and differences are required."); return; }
        if (!sources) { alert("Add sources."); return; }

        if (editing) {
          Object.assign(data.parallels.find((e) => e.id === editing), { title, period, category, summary, parallel, differences, sources });
        } else {
          data.parallels.push({ id: crypto.randomUUID(), title, period, category, summary, parallel, differences, sources, pinned: false });
        }
      }

      save();
      closeModal();
      render();
    }

    document.querySelectorAll(".nav-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        data.view = btn.dataset.view;
        save();
        if (isMobileNav()) closeNav();
        render();
      });
    });

    document.getElementById("menu-btn").addEventListener("click", openNav);
    document.getElementById("nav-backdrop").addEventListener("click", closeNav);

    window.addEventListener("resize", () => {
      if (!isMobileNav()) closeNav();
    });

    document.getElementById("search").addEventListener("input", (e) => {
      searchQuery = e.target.value;
      render();
    });

    document.getElementById("era-filter").addEventListener("change", (e) => {
      eraFilter = e.target.value;
      render();
    });

    document.getElementById("add-btn").addEventListener("click", () => openModal());

    document.getElementById("theme-toggle").addEventListener("click", toggleTheme);

    document.getElementById("export-btn").addEventListener("click", () => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }));
      a.download = "conflict-reference-backup.json";
      a.click();
    });

    document.getElementById("import-btn").addEventListener("click", () => {
      document.getElementById("import-file").click();
    });

    document.getElementById("import-file").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          data = JSON.parse(ev.target.result);
          if (data.darkMode === undefined) data.darkMode = false;
          save();
          applyTheme();
          render();
          alert("Backup restored.");
        } catch {
          alert("Could not read that file.");
        }
      };
      reader.readAsText(file);
      e.target.value = "";
    });

    document.getElementById("modal").addEventListener("click", (e) => {
      if (e.target.id === "modal") closeModal();
    });

    applyTheme();
    render();
  </script>
</body>
</html>
